<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GENESIS — Universe Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#03040a;--gold:#f5c842;--cyan:#00e5ff;--pink:#ff2060;--muted:rgba(245,200,66,.4);--border:rgba(245,200,66,.12);}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:'DM Mono',monospace;cursor:crosshair;}
#canvas{position:fixed;inset:0;z-index:0;}
#topBar{position:fixed;top:0;left:0;right:0;padding:20px 28px;display:flex;align-items:center;justify-content:space-between;z-index:20;background:linear-gradient(180deg,rgba(3,4,10,.9) 0%,transparent 100%);}
.logo{font-family:'Bebas Neue';font-size:2rem;letter-spacing:.15em;background:linear-gradient(135deg,var(--gold),#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-sub{font-size:.45rem;letter-spacing:.5em;color:var(--muted);text-transform:uppercase;margin-top:2px;}
#stats{display:flex;gap:24px;align-items:center;}
.stat{text-align:center;}
.stat-n{font-family:'Bebas Neue';font-size:1.3rem;color:var(--gold);letter-spacing:.05em;}
.stat-l{font-size:.4rem;letter-spacing:.4em;color:var(--muted);text-transform:uppercase;}
#modes{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:20;}
.mode-btn{padding:10px 20px;background:rgba(3,4,10,.8);border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;transition:all .3s;backdrop-filter:blur(10px);}
.mode-btn:hover,.mode-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(245,200,66,.08);}
#oraclePanel{position:fixed;bottom:90px;right:28px;width:280px;border:1px solid var(--border);background:rgba(3,4,10,.85);backdrop-filter:blur(16px);padding:16px 18px;z-index:20;}
.oracle-label{font-size:.42rem;letter-spacing:.5em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.oracle-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.4;}50%{opacity:1;}}
#oracleText{font-size:.65rem;line-height:1.8;color:rgba(255,255,255,.55);font-style:italic;min-height:60px;}
#askBtn{margin-top:12px;width:100%;padding:8px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:.44rem;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;transition:all .3s;}
#askBtn:hover{border-color:var(--gold);color:var(--gold);}
#controls{position:fixed;bottom:90px;left:28px;z-index:20;display:flex;flex-direction:column;gap:5px;}
.ctrl{font-size:.42rem;letter-spacing:.2em;color:rgba(245,200,66,.3);text-transform:uppercase;}
.ctrl span{color:rgba(245,200,66,.6);margin-right:6px;}
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:100;transition:opacity .1s;}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="flash"></div>
<div id="topBar">
  <div>
    <div class="logo">GENESIS</div>
    <div class="logo-sub">Universe Simulator · Akın Üner</div>
  </div>
  <div id="stats">
    <div class="stat"><div class="stat-n" id="statBodies">0</div><div class="stat-l">Bodies</div></div>
    <div class="stat"><div class="stat-n" id="statCollisions">0</div><div class="stat-l">Collisions</div></div>
    <div class="stat"><div class="stat-n" id="statTime">0</div><div class="stat-l">Seconds</div></div>
  </div>
</div>
<div id="oraclePanel">
  <div class="oracle-label"><div class="oracle-dot"></div>Oracle AI</div>
  <div id="oracleText">Click anywhere to create stars. Watch your universe come alive...</div>
  <button id="askBtn" onclick="askOracle()">✦ Ask Oracle (Space)</button>
</div>
<div id="controls">
  <div class="ctrl"><span>[1]</span> Star</div>
  <div class="ctrl"><span>[2]</span> Black Hole</div>
  <div class="ctrl"><span>[3]</span> Nebula</div>
  <div class="ctrl"><span>[4]</span> Comet</div>
  <div class="ctrl"><span>[B]</span> Big Bang</div>
  <div class="ctrl"><span>[S]</span> Supernova</div>
  <div class="ctrl"><span>[Space]</span> Ask Oracle</div>
</div>
<div id="modes">
  <button class="mode-btn active" id="btn1" onclick="setMode(1)">⭐ Star</button>
  <button class="mode-btn" id="btn2" onclick="setMode(2)">⚫ Black Hole</button>
  <button class="mode-btn" id="btn3" onclick="setMode(3)">☁ Nebula</button>
  <button class="mode-btn" id="btn4" onclick="setMode(4)">☄ Comet</button>
  <button class="mode-btn" id="btnBang" onclick="bigBang()">💥 Big Bang</button>
</div>
<script>
// Canvas setup
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

// State
const bodies=[], particles=[];
let collisions=0, startTime=Date.now(), mode=1;
const G=0.5;

// Body class
class Body{
  constructor(x,y,type){
    this.x=x; this.y=y; this.type=type; this.alive=true;
    this.vx=(Math.random()-.5)*1.5;
    this.vy=(Math.random()-.5)*1.5;
    if(type==='star'){
      this.mass=20+Math.random()*40; this.radius=4+Math.random()*8;
      this.age=0; this.maxAge=800+Math.random()*400;
      this.hue=30+Math.random()*60;
    } else if(type==='blackhole'){
      this.mass=200+Math.random()*300; this.radius=12+Math.random()*10;
      this.accretionAngle=0;
    } else if(type==='nebula'){
      this.mass=5+Math.random()*10; this.radius=20+Math.random()*30;
      this.hue=Math.random()*360; this.vx*=0.3; this.vy*=0.3;
    } else if(type==='comet'){
      this.mass=3+Math.random()*5; this.radius=3+Math.random()*3;
      this.trail=[]; this.vx=(Math.random()-.5)*6; this.vy=(Math.random()-.5)*6;
    }
  }

  applyGravity(other){
    const dx=other.x-this.x, dy=other.y-this.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<1) return;
    if(dist<this.radius+other.radius){
      if(this.mass>=other.mass){
        this.mass+=other.mass*.5;
        this.radius=Math.min(this.radius*1.1,50);
        other.alive=false; collisions++;
      }
      return;
    }
    const force=G*this.mass*other.mass/(dist*dist);
    this.vx+=force/this.mass*(dx/dist);
    this.vy+=force/this.mass*(dy/dist);
  }

  update(){
    this.vx*=0.999; this.vy*=0.999;
    if(this.type==='comet'){
      this.trail.push({x:this.x,y:this.y});
      if(this.trail.length>30) this.trail.shift();
    }
    this.x+=this.vx; this.y+=this.vy;
    if(this.type==='star'){
      this.age++;
      if(this.age>this.maxAge){supernova(this.x,this.y);this.alive=false;}
    }
    if(this.type==='blackhole') this.accretionAngle+=0.02;
    if(this.type==='comet'){
      if(this.x<-50) this.x=canvas.width+50;
      if(this.x>canvas.width+50) this.x=-50;
      if(this.y<-50) this.y=canvas.height+50;
      if(this.y>canvas.height+50) this.y=-50;
    } else {
      if(this.x<this.radius){this.x=this.radius;this.vx*=-.7;}
      if(this.x>canvas.width-this.radius){this.x=canvas.width-this.radius;this.vx*=-.7;}
      if(this.y<this.radius){this.y=this.radius;this.vy*=-.7;}
      if(this.y>canvas.height-this.radius){this.y=canvas.height-this.radius;this.vy*=-.7;}
    }
  }

  draw(){
    ctx.save();
    if(this.type==='star'){
      const a=1-this.age/this.maxAge*.5;
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.radius*3);
      g.addColorStop(0,`hsla(${this.hue},90%,90%,${a})`);
      g.addColorStop(.4,`hsla(${this.hue},80%,70%,${a*.6})`);
      g.addColorStop(1,`hsla(${this.hue},70%,50%,0)`);
      ctx.beginPath(); ctx.arc(this.x,this.y,this.radius*3,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
      ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
      ctx.fillStyle=`hsla(${this.hue},100%,95%,${a})`; ctx.fill();
    } else if(this.type==='blackhole'){
      ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
      ctx.fillStyle='#000'; ctx.fill();
      for(let i=0;i<3;i++){
        ctx.beginPath();
        ctx.ellipse(this.x,this.y,this.radius*(2.5+i*.8),this.radius*(.5+i*.15),this.accretionAngle+i*.4,0,Math.PI*2);
        ctx.strokeStyle=`hsla(${30+i*20},90%,65%,${.5-i*.12})`;
        ctx.lineWidth=2-i*.5; ctx.stroke();
      }
      const g=ctx.createRadialGradient(this.x,this.y,this.radius,this.x,this.y,this.radius*4);
      g.addColorStop(0,'rgba(255,140,0,.15)'); g.addColorStop(1,'rgba(255,140,0,0)');
      ctx.beginPath(); ctx.arc(this.x,this.y,this.radius*4,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    } else if(this.type==='nebula'){
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.radius);
      g.addColorStop(0,`hsla(${this.hue},70%,65%,.25)`);
      g.addColorStop(.6,`hsla(${this.hue},60%,50%,.12)`);
      g.addColorStop(1,`hsla(${this.hue},50%,40%,0)`);
      ctx.beginPath(); ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    } else if(this.type==='comet'){
      for(let i=0;i<this.trail.length;i++){
        const t=this.trail[i], a=i/this.trail.length;
        ctx.beginPath(); ctx.arc(t.x,t.y,this.radius*a*.8,0,Math.PI*2);
        ctx.fillStyle=`rgba(180,220,255,${a*.5})`; ctx.fill();
      }
      const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.radius*2);
      g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(1,'rgba(120,200,255,0)');
      ctx.beginPath(); ctx.arc(this.x,this.y,this.radius*2,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    }
    ctx.restore();
  }
}

class Particle{
  constructor(x,y){
    this.x=x; this.y=y;
    const a=Math.random()*Math.PI*2, s=1+Math.random()*5;
    this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
    this.life=1; this.decay=.015+Math.random()*.02;
    this.hue=20+Math.random()*40; this.size=1+Math.random()*3;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=.02;this.life-=this.decay;}
  draw(){
    ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle=`hsla(${this.hue},100%,75%,${this.life})`;ctx.fill();
  }
}

function supernova(x,y){
  for(let i=0;i<80;i++) particles.push(new Particle(x,y));
  if(Math.random()>.5){
    for(let i=0;i<2;i++) bodies.push(new Body(x+(Math.random()-.5)*100,y+(Math.random()-.5)*100,'star'));
  }
}

// Starfield
const stars=Array.from({length:200},()=>({
  x:Math.random()*window.innerWidth,
  y:Math.random()*window.innerHeight,
  r:Math.random()*1.2,
  a:.2+Math.random()*.8
}));

// Main loop
function loop(){
  requestAnimationFrame(loop);
  ctx.fillStyle='rgba(3,4,10,0.18)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();});
  for(let i=0;i<bodies.length;i++)
    for(let j=0;j<bodies.length;j++)
      if(i!==j&&bodies[i].alive&&bodies[j].alive) bodies[i].applyGravity(bodies[j]);
  for(let i=bodies.length-1;i>=0;i--){
    if(!bodies[i].alive){bodies.splice(i,1);continue;}
    bodies[i].update();bodies[i].draw();
  }
  for(let i=particles.length-1;i>=0;i--){
    if(particles[i].life<=0){particles.splice(i,1);continue;}
    particles[i].update();particles[i].draw();
  }
  document.getElementById('statBodies').textContent=bodies.length;
  document.getElementById('statCollisions').textContent=collisions;
  document.getElementById('statTime').textContent=Math.floor((Date.now()-startTime)/1000);
}
loop();

// Auto comet
setInterval(()=>{
  const edge=Math.floor(Math.random()*4);
  let x,y;
  if(edge===0){x=Math.random()*canvas.width;y=-20;}
  else if(edge===1){x=Math.random()*canvas.width;y=canvas.height+20;}
  else if(edge===2){x=-20;y=Math.random()*canvas.height;}
  else{x=canvas.width+20;y=Math.random()*canvas.height;}
  bodies.push(new Body(x,y,'comet'));
},8000);

// Click to create
const typeMap={1:'star',2:'blackhole',3:'nebula',4:'comet'};
canvas.addEventListener('click',e=>bodies.push(new Body(e.clientX,e.clientY,typeMap[mode])));

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn'+m)?.classList.add('active');
}

function bigBang(){
  const f=document.getElementById('flash');
  f.style.opacity='1';setTimeout(()=>f.style.opacity='0',100);
  const cx=canvas.width/2,cy=canvas.height/2;
  for(let i=0;i<30;i++){
    const b=new Body(cx,cy,'star');
    const a=(i/30)*Math.PI*2;
    b.vx=Math.cos(a)*(2+Math.random()*4);
    b.vy=Math.sin(a)*(2+Math.random()*4);
    bodies.push(b);
  }
  for(let i=0;i<80;i++) particles.push(new Particle(cx,cy));
}

document.addEventListener('keydown',e=>{
  if(e.key==='1') setMode(1);
  else if(e.key==='2') setMode(2);
  else if(e.key==='3') setMode(3);
  else if(e.key==='4') setMode(4);
  else if(e.key==='b'||e.key==='B') bigBang();
  else if(e.key==='s'||e.key==='S'){
    const star=bodies.find(b=>b.type==='star');
    if(star){supernova(star.x,star.y);star.alive=false;}
  }
  else if(e.code==='Space'){e.preventDefault();askOracle();}
});

// Oracle
let oracleBusy=false;
async function askOracle(){
  if(oracleBusy) return;
  oracleBusy=true;
  document.getElementById('oracleText').textContent='The Oracle gazes into your universe...';
  document.getElementById('askBtn').textContent='⟳ Thinking...';
  const s=bodies.filter(b=>b.type==='star').length;
  const h=bodies.filter(b=>b.type==='blackhole').length;
  const n=bodies.filter(b=>b.type==='nebula').length;
  const c=bodies.filter(b=>b.type==='comet').length;
  const t=Math.floor((Date.now()-startTime)/1000);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:120,
        system:'You are a poetic Oracle observing a simulated universe. Speak in 2-3 short philosophical sentences. Be mysterious and profound.',
        messages:[{role:'user',content:`My universe: ${s} stars, ${h} black holes, ${n} nebulas, ${c} comets. ${collisions} collisions in ${t} seconds. What do you see?`}]
      })
    });
    const data=await res.json();
    document.getElementById('oracleText').textContent=data.content?.[0]?.text||'The universe speaks in silence...';
  } catch(e){
    document.getElementById('oracleText').textContent='The cosmos is beyond words today. Keep creating...';
  }
  document.getElementById('askBtn').textContent='✦ Ask Oracle (Space)';
  oracleBusy=false;
}
</script>
</body>
</html>
